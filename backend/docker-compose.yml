version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: task-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: tasksdb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: task-backend
    depends_on:
      - postgres
    ports:
      - '3000:3000'
    env_file:
      - .env

volumes:
  postgres_data: